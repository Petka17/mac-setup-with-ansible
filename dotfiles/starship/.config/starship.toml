format = """
$directory$git_branch$git_status$nodejs$python$rust$golang$java$ruby$php$terraform$docker_context$cmd_duration
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold purple"
truncation_length = 30

[git_status]
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
deleted = "✘${count}"
stashed = "$${count}"

[cmd_duration]
min_time = 2_000
format = " [$duration](bold yellow)"

[nodejs]
symbol = " "
style = "bold green"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
symbol = " "
style = "bold yellow"
detect_files = [
  "pyproject.toml",
  "requirements.txt",
  "setup.py",
  ".python-version",
]

[rust]
symbol = " "
style = "bold orange"

[golang]
symbol = " "
style = "bold cyan"

[java]
symbol = " "
style = "bold red"

[ruby]
symbol = " "
style = "bold red"

[php]
symbol = " "
style = "bold purple"

[terraform]
symbol = "󱁢 "
style = "bold purple"
detect_files = ["*.tf", "*.tfvars"]

[docker_context]
symbol = " "
style = "bold blue"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

[package]
disabled = true
