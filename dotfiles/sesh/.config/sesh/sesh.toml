# sesh — smart tmux session manager. https://github.com/joshmedeski/sesh
#
# The picker list is built by sesh-picker.sh, which scans ~/code/*/* and adds a
# few pinned paths (see EXTRA_DIRS in that script) — not zoxide history. The
# [[wildcard]] below is what makes a path-based `sesh connect` open the project
# window layout, so keep it in sync with that scan pattern.

[default_session]
preview_command = "eza --all --git --icons --color=always {}"

# Dedicated ungit session — just runs the git UI; its working dir is irrelevant.
# The picker lists this via `sesh list -c` and connects by name.
[[session]]
name = "ungit"
path = "~"
startup_command = "ungit --no-b"

[[wildcard]]
pattern = "~/code/*/*"
startup_command = "tmux select-window -t editor && exit"
windows = ["editor", "term", "server", "tests", "agent"]

[[window]]
name = "editor"
startup_script = "nvim"

[[window]]
name = "term"

[[window]]
name = "server"

[[window]]
name = "tests"

[[window]]
name = "agent"
startup_script = "claude"
