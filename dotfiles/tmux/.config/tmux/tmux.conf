# Reload conf shotcut
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# when a session is killed, jump to another instead of detaching
set -g detach-on-destroy off

# 256 color + true color
set -ga terminal-overrides ",xterm-256color:Tc"
set -g default-terminal "tmux-256color"

set -gq allow-passthrough on
set -g visual-activity off

# enable mouse
set -g mouse on

# remap prefix from C-b to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Set delay between prefix and command
set -sg escape-time 3
set -g repeat-time 0

# start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# split panes with | and -
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind M-h resize-pane -L 5
bind M-j resize-pane -D 5
bind M-k resize-pane -U 5
bind M-l resize-pane -R 5

# Copy mode
bind [ copy-mode
bind ] paste-buffer

# Enable Vim keybindings
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# increase scrollback
set -g history-limit 50000

# show status messages for 4s (default 750ms)
set -g display-time 4000

# refresh status bar every 5s (default 15s)
set -g status-interval 5

# don't constrain window size to smallest attached client
setw -g aggressive-resize on

# focus events (helps neovim)
set -g focus-events on

# keybindings
bind C-f display-popup -E -w 80% -h 70% "$HOME/.local/bin/sesh-picker.sh"
bind C-g display-popup -E -w 80% -h 70% "$HOME/.local/bin/sesh-picker.sh sessions"

# status bar
set -g status-position bottom
set -g status-style "bg=#313244,fg=#cdd6f4"
set -g status-left " "
set -g status-right "#[bold]#S "
set -g window-status-style "fg=#6c7086"
set -g window-status-format "#I:#W"
set -g window-status-current-style "bold,underscore,fg=#cdd6f4"
set -g window-status-current-format "#I:#W"
set -g window-status-separator "  "
