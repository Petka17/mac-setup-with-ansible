---
- name: Install Grok Build
  # greedy: let brew own updates for casks that mark themselves auto_updates
  # (see tasks/browsers.yml) so cask handling stays uniform.
  community.general.homebrew_cask:
    name: grok-build
    state: latest
    greedy: true

- name: Stow grok dotfiles
  # --restow, no creates guard: with --no-folding each file gets its own
  # symlink, so files added to the package later would never be linked if the
  # task stopped running once a sentinel file existed.
  ansible.builtin.command:
    cmd: stow -d {{ playbook_dir }}/dotfiles -t {{ ansible_env.HOME }} --no-folding --restow grok
  changed_when: false
