---
- name: Tap anomalyco/tap
  community.general.homebrew_tap:
    name: anomalyco/tap

- name: Install Opencode
  # Fully qualified name: the anomalyco tap shadows homebrew-core's `opencode`
  # formula, and the bare name would resolve to core on a machine without the
  # tap — a different distribution than the one this setup targets.
  community.general.homebrew:
    name: anomalyco/tap/opencode
    state: latest

- name: Stow opencode dotfiles
  ansible.builtin.import_tasks: stow.yml
  vars:
    stow_package: opencode
    stow_mode: restow
