---
- name: Install mise
  community.general.homebrew:
    name: mise
    state: latest

- name: Stow mise dotfiles
  # fold: mise keeps runtime state in ~/.local/share/mise and ~/.cache/mise,
  # not ~/.config/mise, so a single folded symlink is safe.
  ansible.builtin.import_tasks: stow.yml
  vars:
    stow_package: mise
    stow_mode: fold
    stow_creates: "{{ ansible_env.HOME }}/.config/mise/config.toml"

- name: Install mise tools
  # mise reports to stderr; "all tools are installed" is its no-op message,
  # anything else means at least one tool was actually installed.
  ansible.builtin.command:
    cmd: mise install
  register: mise_install
  changed_when: "'all tools are installed' not in mise_install.stderr"

- name: Upgrade mise tools
  # `mise install` only installs missing tools; loose pins like `latest`,
  # `lts`, and `nightly` resolve once and then freeze. `mise upgrade`
  # re-resolves them so those tools track new releases on every run.
  # mise reports to stderr; "All tools are up to date" is its no-op message.
  ansible.builtin.command:
    cmd: mise upgrade
  register: mise_upgrade
  changed_when: "'All tools are up to date' not in mise_upgrade.stderr"
