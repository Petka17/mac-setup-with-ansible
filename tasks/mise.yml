---
- name: Install mise
  community.general.homebrew:
    name: mise
    state: latest

- name: Stow mise dotfiles
  # fold: mise keeps runtime state in ~/.local/share/mise and ~/.cache/mise,
  # not ~/.config/mise, so a single folded symlink is safe.
  ansible.builtin.import_tasks: stow.yml
  vars:
    stow_package: mise
    stow_mode: fold
    stow_creates: "{{ ansible_env.HOME }}/.config/mise/config.toml"

- name: Install mise tools
  ansible.builtin.command:
    cmd: mise install
  changed_when: false

- name: Upgrade mise tools
  # `mise install` only installs missing tools; loose pins like `latest`,
  # `lts`, and `nightly` resolve once and then freeze. `mise upgrade`
  # re-resolves them so those tools track new releases on every run.
  ansible.builtin.command:
    cmd: mise upgrade
  changed_when: false
