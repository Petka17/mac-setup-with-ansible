---
- name: Install Starship
  community.general.homebrew:
    name: starship
    state: latest

- name: Stow starship dotfiles
  # --restow, no creates guard: with --no-folding each file gets its own
  # symlink, so files added to the package later would never be linked if the
  # task stopped running once a sentinel file existed.
  ansible.builtin.command:
    cmd: stow -d {{ playbook_dir }}/dotfiles -t {{ ansible_env.HOME }} --no-folding --restow starship
  changed_when: false
