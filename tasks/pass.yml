---
- name: Install pass and related tools
  community.general.homebrew:
    name:
      - gnupg
      - pinentry-mac
      - pass
      - pass-otp
      - pwgen
      - choose-gui
    state: latest

- name: Ensure ~/.gnupg exists with safe permissions
  # Created before stow: otherwise stow makes the directory itself with
  # umask permissions (755) and gpg complains "unsafe permissions on
  # homedir" on every invocation. GnuPG requires 700 here.
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.gnupg"
    state: directory
    mode: "0700"

- name: Stow gnupg dotfiles
  # --restow, no creates guard: with --no-folding each file gets its own
  # symlink, so files added to the package later would never be linked if the
  # task stopped running once a sentinel file existed.
  ansible.builtin.command:
    cmd: stow -d {{ playbook_dir }}/dotfiles -t {{ ansible_env.HOME }} --no-folding --restow gnupg
  changed_when: false

- name: Restart gpg-agent to pick up new config
  # Always kill: the stow task above can no longer report "changed", and
  # gpgconf --kill is a no-op (exit 0) when the agent isn't running.
  ansible.builtin.command:
    cmd: gpgconf --kill gpg-agent
  changed_when: false
