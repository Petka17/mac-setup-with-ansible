---
- name: Install git tools
  community.general.homebrew:
    name:
      - git
      - git-delta
      - gh
    state: latest

- name: Write git identity from machine-local vars (local.yml)
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.gitconfig.local"
    content: |
      [user]
        name = {{ git_user_name }}
        email = {{ git_user_email }}
    mode: "0644"

- name: Stow git dotfiles
  ansible.builtin.import_tasks: stow.yml
  vars:
    stow_package: git
    stow_mode: restow
