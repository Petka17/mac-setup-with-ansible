---
- name: Install tmux and sesh
  community.general.homebrew:
    name:
      - tmux
      - sesh
    state: latest

- name: Stow sesh dotfiles
  ansible.builtin.command:
    cmd: stow -d {{ playbook_dir }}/dotfiles -t {{ ansible_env.HOME }} sesh
    creates: "{{ ansible_env.HOME }}/.config/sesh/sesh.toml"

- name: Stow tmux dotfiles
  # No --no-folding: fold into a single ~/.config/tmux symlink so new repo
  # files appear automatically. Safe because tmux keeps no runtime state in
  # ~/.config/tmux.
  ansible.builtin.command:
    cmd: stow -d {{ playbook_dir }}/dotfiles -t {{ ansible_env.HOME }} tmux
    creates: "{{ ansible_env.HOME }}/.config/tmux/tmux.conf"
