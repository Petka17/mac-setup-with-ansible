---
- name: Configure macOS
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    homebrew_prefix: /opt/homebrew
    ansible_become_password: "{{ sudo_password }}"
    # personal | work — overridden by the gitignored local.yml, which
    # bootstrap.sh passes via `-e @local.yml`.
    profile: personal

  vars_files:
    - "vars/{{ profile }}.yml"

  vars_prompt:
    - name: sudo_password
      prompt: "Sudo password"
      private: true

  environment:
    PATH: "{{ homebrew_prefix }}/bin:{{ ansible_env.PATH }}"

  pre_tasks:
    # always: without it, --tags runs would skip this untagged check.
    - name: Check machine-local vars
      tags: [always]
      ansible.builtin.assert:
        that:
          - git_user_name is defined
          - git_user_email is defined
        fail_msg: >-
          Machine-local vars are missing — create local.yml
          (cp local.example.yml local.yml), fill in your git identity,
          and re-run.
        quiet: true

    - name: Ensure ~/.config exists before any stow task runs
      # always: this must run before the first folding stow package regardless
      # of --tags, so it lives in pre_tasks, not a tagged task file. On a fresh
      # machine ~/.config doesn't exist yet. GNU Stow folds at the highest level
      # possible, so the first folding stow package (mise) would otherwise
      # create ~/.config itself as a symlink into this repo — and until a later
      # stow splits that fold open, anything writing to ~/.config would write
      # into the repo. Same guard as ~/.local/bin in tasks/scripts.yml.
      tags: [always]
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.config"
        state: directory
        mode: "0755"

  tasks:
    - name: macOS preferences
      ansible.builtin.import_tasks: tasks/macos-defaults.yml
      tags: [defaults]

    - name: Homebrew
      ansible.builtin.import_tasks: tasks/homebrew.yml
      tags: [homebrew]

    - name: Fonts
      ansible.builtin.import_tasks: tasks/fonts.yml
      tags: [fonts]

    - name: Terminal Utilities
      ansible.builtin.import_tasks: tasks/terminal.yml
      tags: [term]

    - name: mkcert
      ansible.builtin.import_tasks: tasks/mkcert.yml
      tags: [mkcert]

    - name: mise
      ansible.builtin.import_tasks: tasks/mise.yml
      tags: [mise]

    - name: zsh
      ansible.builtin.import_tasks: tasks/zsh.yml
      tags: [zsh]

    - name: Custom scripts
      ansible.builtin.import_tasks: tasks/scripts.yml
      tags: [scripts]

    - name: WezTerm
      ansible.builtin.import_tasks: tasks/wezterm.yml
      tags: [wezterm]

    - name: Starship
      ansible.builtin.import_tasks: tasks/starship.yml
      tags: [starship]

    - name: tmux
      ansible.builtin.import_tasks: tasks/tmux.yml
      tags: [tmux]

    - name: Git
      ansible.builtin.import_tasks: tasks/git.yml
      tags: [git]

    - name: Neovim
      ansible.builtin.import_tasks: tasks/nvim.yml
      tags: [nvim]

    - name: Pass utilities
      ansible.builtin.import_tasks: tasks/pass.yml
      tags: [pass]
      when: profile == 'personal'

    - name: skhd
      ansible.builtin.import_tasks: tasks/skhd.yml
      tags: [skhd]
      when: profile == 'personal'

    - name: Ledger
      ansible.builtin.import_tasks: tasks/ledger.yml
      tags: [ledger]
      when: profile == 'personal'

    - name: Claude Code
      ansible.builtin.import_tasks: tasks/claude-code.yml
      tags: [claude]

    - name: Opencode
      ansible.builtin.import_tasks: tasks/opencode.yml
      tags: [opencode]

    - name: Grok Build
      ansible.builtin.import_tasks: tasks/grok.yml
      tags: [grok]
      when: profile == 'personal'

    - name: VeraCrypt
      ansible.builtin.import_tasks: tasks/veracrypt.yml
      tags: [veracrypt]
      when: profile == 'personal'

    - name: Docker
      ansible.builtin.import_tasks: tasks/docker.yml
      tags: [docker]

    - name: AWS CLI
      ansible.builtin.import_tasks: tasks/aws.yml
      tags: [aws]
      when: profile == 'personal'

    - name: Browsers
      ansible.builtin.import_tasks: tasks/browsers.yml
      tags: [browsers]

    - name: Mac Apps
      ansible.builtin.import_tasks: tasks/mac_apps.yml
      tags: [mac_apps]
      when: profile == 'personal'

    - name: Cleanup
      ansible.builtin.import_tasks: tasks/cleanup.yml
      tags: [cleanup]
