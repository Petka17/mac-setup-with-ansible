---
# Machine-local settings — local.yml is gitignored, this example is tracked.
# Set up a new machine once:
#   cp local.example.yml local.yml
# then edit the values below and run ./bootstrap.sh.

# Which vars/<profile>.yml to apply: personal | work
profile: personal

# Git identity for this machine, written to ~/.gitconfig.local by
# tasks/git.yml (the stowed .gitconfig includes that file).
git_user_name: Your Name
git_user_email: you@example.com

# Non-repo directories the sesh picker (sesh-picker.sh) always offers,
# in addition to ~/code/*/*. Written to ~/.config/sesh-extra-dirs by
# tasks/tmux.yml. `~/` is expanded by the script; spaces are fine.
sesh_extra_dirs:
  - ~/.m/.ledger
  - ~/Library/Mobile Documents/iCloud~md~obsidian/Documents/Notes
  - ~/.agents/skills
